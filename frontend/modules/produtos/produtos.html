<div class="page-header">
  <h1>Produtos</h1>
  <p>Cadastre, busque e gerencie os produtos do estoque</p>
</div>

<div class="toolbar">
  <div class="toolbar-left">
    <input id="buscaNome" class="input" type="text" placeholder="Buscar por nome" />
    <button class="btn-outline" onclick="pesquisarProdutos()">Buscar</button>
    <button class="btn-outline" onclick="carregarProdutos()">Limpar</button>
  </div>

  <div class="toolbar-right">
    <button class="btn" onclick="abrirFormularioProduto()">Novo Produto</button>
  </div>
</div>

<div id="produto-form-container" class="card" style="display:none; margin-bottom:18px;">
  <div style="padding:20px;">
    <h3 style="margin-bottom:16px;">Cadastro de Produto</h3>

    <div style="display:grid; grid-template-columns: repeat(2, 1fr); gap:12px;">
      <input id="produto-nome" class="input" placeholder="Nome" />
      <input id="produto-codigo" class="input" placeholder="Código" />
      <input id="produto-preco" class="input" type="number" step="0.01" placeholder="Preço" />
      <input id="produto-quantidade" class="input" type="number" placeholder="Quantidade" />
      <input id="produto-estoque-minimo" class="input" type="number" placeholder="Estoque mínimo" />
      <input id="produto-fornecedor-id" class="input" type="number" placeholder="Fornecedor ID" />
      <input id="produto-categoria-id" class="input" type="number" placeholder="Categoria ID" />
    </div>

    <div style="margin-top:16px; display:flex; gap:10px;">
      <button class="btn" onclick="salvarProduto()">Salvar</button>
      <button class="btn-outline" onclick="fecharFormularioProduto()">Cancelar</button>
    </div>
  </div>
</div>

<div class="card table-card">
  <div class="table-wrapper">
    <table class="table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Produto</th>
          <th>Código</th>
          <th>Preço</th>
          <th>Qtd</th>
          <th>Status</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="produtos-tbody"></tbody>
    </table>
  </div>
</div>
